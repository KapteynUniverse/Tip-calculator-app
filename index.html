<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tip calculator app" />
    <meta name="author" content="Asilcan Toper" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Tip calculator app</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="main">
      <h1 class="sr-only">Tip Calculator</h1>
      <img
        src="./assets/images/logo.svg"
        alt="SPLITTER"
        width="87"
        height="54"
        class="logo"
        fetchpriority="high"
      />
      <form id="form" class="tip-calculator">
        <section class="input-section">
          <div class="bill">
            <label for="bill" class="flex-default">
              Bill
              <span id="err1" class="invalid hidden">Can't be zero</span></label
            >
            <input
              id="bill"
              type="number"
              name="bill"
              placeholder="0"
              min="1"
              inputmode="numeric"
              aria-invalid="false"
              aria-errormessage="err1"
              required
              class="number"
            />
          </div>
          <fieldset class="tip grid">
            <legend>Select Tip %</legend>
            <input
              id="tip-5"
              type="radio"
              name="tip"
              value="5"
              class="sr-only"
            />
            <label for="tip-5">5%</label>
            <input
              id="tip-10"
              type="radio"
              name="tip"
              value="10"
              class="sr-only"
            />
            <label for="tip-10">10%</label>
            <input
              id="tip-15"
              type="radio"
              name="tip"
              value="15"
              class="sr-only"
            />
            <label for="tip-15">15%</label>
            <input
              id="tip-20"
              type="radio"
              name="tip"
              value="20"
              class="sr-only"
            />
            <label for="tip-20">20%</label>
            <input
              id="tip-25"
              type="radio"
              name="tip"
              value="25"
              class="sr-only"
            />
            <label for="tip-25">25%</label>
            <label for="custom" class="sr-only">Custom Tip</label>
            <input
              id="custom"
              type="number"
              name="custom"
              placeholder="Custom"
              min="0"
              inputmode="numeric"
              class="custom"
            />
          </fieldset>
          <div class="people">
            <label for="people" class="flex-default">
              Number of People
              <span id="err2" class="invalid hidden">Can't be zero</span></label
            >
            <input
              id="people"
              type="number"
              name="people"
              placeholder="0"
              min="1"
              inputmode="numeric"
              required
              aria-invalid="false"
              aria-errormessage="err2"
              class="number"
            />
          </div>
        </section>
        <section class="result-section">
          <div>
            <div class="wrapper">
              <div class="amount">
                <p class="amount__text">Tip Amount</p>
                <p class="amount__sub-text">/ person</p>
              </div>
              <p id="tip-per-person" class="amount__number" aria-live="polite">
                $0.00
              </p>
            </div>
            <div class="wrapper">
              <div class="amount">
                <p class="amount__text">Total</p>
                <p class="amount__sub-text">/ person</p>
              </div>
              <p
                id="total-per-person"
                class="amount__number"
                aria-live="polite"
              >
                $0.00
              </p>
            </div>
          </div>
          <button class="amount__button" type="reset">reset</button>
        </section>
      </form>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
